name: Build & Submit to Play Store

# Triggers on push to main when native files change, OR manually via workflow_dispatch
on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'ios/**'
      - 'app.json'
      - 'eas.json'
      - 'babel.config.js'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:
    inputs:
      submit_track:
        description: 'Play Store track to submit to'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - production

concurrency:
  group: native-build-${{ github.sha }}
  cancel-in-progress: false

jobs:
  build-and-submit:
    name: Build & Submit Android
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Decode Google Service Account Key
        run: echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}" | base64 --decode > ./google-sa-key.json

      - name: Notify Slack - Build Starting
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🔨 *Android Build Starting*\n• Commit: `${{ github.event.head_commit.message || 'Manual trigger' }}`\n• By: ${{ github.actor }}"
            }

      - name: Run EAS Build
        run: eas build --platform android --profile production --non-interactive

      - name: Determine submit track
        id: track
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "track=${{ github.event.inputs.submit_track }}" >> "$GITHUB_OUTPUT"
          else
            echo "track=internal" >> "$GITHUB_OUTPUT"
          fi

      - name: Submit to Play Store
        run: eas submit --platform android --profile production --latest --non-interactive

      - name: Notify Slack - Success
        if: success()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ *Build & Submit Complete*\n• Track: `${{ steps.track.outputs.track }}`\n• Commit: `${{ github.event.head_commit.message || 'Manual trigger' }}`\n• By: ${{ github.actor }}\n• <https://play.google.com/console|Open Play Console>"
            }

      - name: Notify Slack - Failure
        if: failure()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ *Build or Submit Failed*\n• Commit: `${{ github.event.head_commit.message || 'Manual trigger' }}`\n• By: ${{ github.actor }}\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
            }
